name: ci

on:
  push:
  pull_request:

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Syntax check
        run: python3 -m py_compile codex_multi_manager.py
      - name: Smoke test
        run: bash tests/smoke_test.sh
